<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>drglo · shop</title>
  <meta name="description" content="drglo — next-gen laundry. Tap your region to shop."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:#f5f2ee;min-height:100%;}

    body{
      font-family:'Tajawal',sans-serif;
      display:flex;flex-direction:column;align-items:center;
      min-height:100vh;padding:0 1rem 3rem;
      background:#f5f2ee;
    }

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

    .hero{
      width:100%;max-width:640px;
      display:flex;flex-direction:column;align-items:center;
      position:relative;padding-top:2.8rem;margin-bottom:1.4rem;
      animation:fadeUp .6s ease both;
    }

    .logo-bg{
      position:absolute;top:-40px;left:50%;transform:translateX(-50%);
      width:280px;height:280px;
      background:center/contain no-repeat;
      opacity:.07;filter:blur(3px) saturate(0);
      pointer-events:none;z-index:0;
    }

    .logo-img{
      width:90px;height:90px;object-fit:contain;
      position:relative;z-index:1;margin-bottom:.9rem;
    }

    .brand-en{
      font-family:'Cormorant Garamond',serif;
      font-size:36px;font-weight:500;
      letter-spacing:.13em;color:#1a1a18;
      text-transform:lowercase;
      position:relative;z-index:1;
    }

    .brand-sub{
      font-size:11px;color:#8a8a84;
      margin-top:6px;letter-spacing:.09em;
      position:relative;z-index:1;
    }

    .lang-toggle{
      display:flex;gap:6px;margin-bottom:1.1rem;
      animation:fadeUp .6s .07s ease both;
    }
    .ltbtn{
      background:none;border:1px solid rgba(0,0,0,.12);
      border-radius:20px;padding:4px 15px;
      font-size:12px;font-family:'Tajawal',sans-serif;
      color:#8a8a84;cursor:pointer;transition:all .2s;
    }
    .ltbtn.active{
      background:rgba(20,60,120,.07);
      border-color:rgba(20,60,120,.22);
      color:#183878;
    }

    .map-shell{
      width:100%;max-width:640px;
      border-radius:18px;
      border:1px solid rgba(0,0,0,.07);
      overflow:visible;background:#e8e3db;
      position:relative;
      animation:fadeUp .6s .13s ease both;
    }

    #gulf-svg{display:block;width:100%;border-radius:18px;overflow:visible;}

    .tip{
      position:absolute;pointer-events:none;
      background:#fff;border:1px solid rgba(0,0,0,.1);
      border-radius:8px;padding:6px 12px;
      font-size:12px;font-family:'Tajawal',sans-serif;
      color:#1a1a18;white-space:nowrap;
      opacity:0;transition:opacity .15s;z-index:30;
      box-shadow:0 2px 12px rgba(0,0,0,.1);
    }

    .cards{
      width:100%;max-width:640px;
      display:grid;grid-template-columns:1fr 1fr;
      gap:10px;margin-top:12px;
      animation:fadeUp .6s .22s ease both;
    }
    @media(max-width:440px){.cards{grid-template-columns:1fr;}}

    .card{
      background:#fff;border:1px solid rgba(0,0,0,.08);
      border-radius:14px;padding:1rem 1.1rem;
      cursor:pointer;text-decoration:none;
      display:flex;align-items:center;gap:12px;
      transition:border-color .2s,transform .15s,box-shadow .2s;
    }
    .card:hover{
      border-color:rgba(20,60,120,.18);
      transform:translateY(-2px);
      box-shadow:0 4px 20px rgba(0,0,0,.07);
    }
    .card:active{transform:scale(.98);}

    .flag-wrap{
      width:36px;height:24px;border-radius:4px;
      overflow:hidden;flex-shrink:0;
      border:1px solid rgba(0,0,0,.08);
    }
    .fi{width:36px!important;height:24px!important;background-size:cover!important;}

    .ctxt{flex:1;}
    .clabel{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#b0afa8;margin-bottom:2px;}
    .ctitle{font-size:14px;font-weight:500;color:#1a1a18;}
    .csub{font-size:11px;color:#9a9a94;font-weight:300;margin-top:1px;}
    .carr{color:#c0bfb8;font-size:14px;transition:transform .15s;flex-shrink:0;}
    .card:hover .carr{transform:translateX(3px);}

    .footer{
      margin-top:1.8rem;font-size:11px;
      color:#c0bfb8;letter-spacing:.05em;
      animation:fadeUp .6s .3s ease both;
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="logo-bg" id="logo-bg" style="background-image:url('logo.png')"></div>
  <img src="logo.png" class="logo-img" id="logo-img" alt="drglo"
    onerror="this.style.display='none';document.getElementById('logo-bg').style.display='none'"/>
  <div class="brand-en">drglo</div>
  <div class="brand-sub" id="brand-sub">NEXT-GEN LAUNDRY · TAP YOUR REGION</div>
</div>

<div class="lang-toggle">
  <button class="ltbtn active" id="btn-en" onclick="setLang('en')">English</button>
  <button class="ltbtn" id="btn-ar" onclick="setLang('ar')">عربي</button>
</div>

<div class="map-shell">
  <svg id="gulf-svg" viewBox="0 0 640 400" style="overflow:visible"></svg>
  <div class="tip" id="tip"></div>
</div>

<div class="cards" id="cards">
  <a href="YOUR_BAHRAIN_LINK_HERE" class="card" target="_blank" rel="noopener">
    <div class="flag-wrap"><span class="fi fi-bh fis"></span></div>
    <div class="ctxt">
      <div class="clabel" id="lbl-bh"></div>
      <div class="ctitle" id="title-bh"></div>
      <div class="csub" id="sub-bh"></div>
    </div>
    <div class="carr" id="arr-bh">→</div>
  </a>
  <a href="YOUR_INTERNATIONAL_LINK_HERE" class="card" target="_blank" rel="noopener">
    <div class="flag-wrap"><span class="fi fi-sa fis"></span></div>
    <div class="ctxt">
      <div class="clabel" id="lbl-gl"></div>
      <div class="ctitle" id="title-gl"></div>
      <div class="csub" id="sub-gl"></div>
    </div>
    <div class="carr" id="arr-gl">→</div>
  </a>
</div>

<div class="footer" id="footer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
  const BH_LINK = 'YOUR_BAHRAIN_LINK_HERE';
  const GL_LINK = 'YOUR_INTERNATIONAL_LINK_HERE';

  const GULF = {
    '48': {en:'Bahrain',              ar:'البحرين',                  iso:'bh', bh:true,  lon:50.5577, lat:26.0667},
    '682':{en:'Saudi Arabia',         ar:'المملكة العربية السعودية', iso:'sa', bh:false, lon:45.0,    lat:24.0},
    '784':{en:'UAE',                  ar:'الإمارات',                 iso:'ae', bh:false, lon:54.0,    lat:23.9},
    '512':{en:'Oman',                 ar:'عُمان',                    iso:'om', bh:false, lon:57.5,    lat:22.5},
    '414':{en:'Kuwait',               ar:'الكويت',                   iso:'kw', bh:false, lon:47.5,    lat:29.3},
    '634':{en:'Qatar',                ar:'قطر',                      iso:'qa', bh:false, lon:51.2,    lat:25.3},
    '368':{en:'Iraq',                 ar:'العراق',                   iso:'iq', bh:false, lon:43.7,    lat:33.0},
    '887':{en:'Yemen',                ar:'اليمن',                    iso:'ye', bh:false, lon:47.5,    lat:15.5},
  };

  const T = {
    en:{
      sub:'NEXT-GEN LAUNDRY · TAP YOUR REGION',
      lblBh:'bahrain only', titBh:'Bahrain Store',       subBh:'Local delivery',
      lblGl:'worldwide',    titGl:'International Store', subGl:'Saudi Arabia + global shipping',
      tipBh:'Bahrain Store', tipGl:'International Store',
      footer:'drglo · clean reimagined', arr:'→'
    },
    ar:{
      sub:'غسيل من الجيل القادم · اضغط على منطقتك',
      lblBh:'البحرين فقط', titBh:'متجر البحرين',    subBh:'توصيل محلي',
      lblGl:'دولي',        titGl:'المتجر الدولي',   subGl:'السعودية + شحن عالمي',
      tipBh:'متجر البحرين', tipGl:'المتجر الدولي',
      footer:'drglo · نظافة من نوع جديد', arr:'←'
    }
  };

  let lang = 'en';

  function applyLang(l) {
    lang = l;
    const s = T[l], isAr = l === 'ar';
    document.getElementById('brand-sub').textContent  = s.sub;
    document.getElementById('lbl-bh').textContent     = s.lblBh;
    document.getElementById('title-bh').textContent   = s.titBh;
    document.getElementById('sub-bh').textContent     = s.subBh;
    document.getElementById('lbl-gl').textContent     = s.lblGl;
    document.getElementById('title-gl').textContent   = s.titGl;
    document.getElementById('sub-gl').textContent     = s.subGl;
    document.getElementById('footer').textContent     = s.footer;
    document.getElementById('arr-bh').textContent     = s.arr;
    document.getElementById('arr-gl').textContent     = s.arr;
    document.getElementById('btn-en').classList.toggle('active', !isAr);
    document.getElementById('btn-ar').classList.toggle('active', isAr);
    document.getElementById('cards').style.direction  = isAr ? 'rtl' : 'ltr';
    document.documentElement.lang = l;
  }

  function setLang(l) { applyLang(l); }

  const W = 640, H = 400;
  const svg   = d3.select('#gulf-svg');
  const tip   = document.getElementById('tip');
  const shell = document.querySelector('.map-shell');
  const GULF_IDS = new Set(Object.keys(GULF));

  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#e8e3db').attr('rx',18);

  const projection = d3.geoMercator().center([50,24]).scale(1050).translate([W/2,H/2]);
  const pathGen    = d3.geoPath(projection);

  const FILL_DEFAULT   = '#d4cfc6';
  const FILL_BH        = '#b8c8e8';
  const FILL_HOVER     = '#c2bdb4';
  const FILL_BH_HOVER  = '#9ab4d8';

  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
    const all       = topojson.feature(world, world.objects.countries).features;
    const gulfFeats = all.filter(d => GULF_IDS.has(String(d.id)));

    svg.selectAll('path.gc')
      .data(gulfFeats).join('path').attr('class','gc')
      .attr('d', pathGen)
      .attr('fill', d => String(d.id)==='48' ? FILL_BH : FILL_DEFAULT)
      .attr('stroke','#f5f2ee').attr('stroke-width',1.2)
      .style('cursor','pointer').style('opacity',0)
      .transition().duration(700).delay((_,i) => i*55).style('opacity',1);

    svg.selectAll('path.gc')
      .on('mousemove', function(event, d) {
        const isBH = String(d.id)==='48';
        d3.select(this).attr('fill', isBH ? FILL_BH_HOVER : FILL_HOVER);
        showTip(event, d);
      })
      .on('mouseleave', function(event, d) {
        d3.select(this).attr('fill', String(d.id)==='48' ? FILL_BH : FILL_DEFAULT);
        tip.style.opacity = 0;
      })
      .on('click', function(event, d) {
        window.open(String(d.id)==='48' ? BH_LINK : GL_LINK, '_blank');
      });

    function showTip(event, d) {
      const rect = shell.getBoundingClientRect();
      const x = event.clientX - rect.left, y = event.clientY - rect.top;
      const isBH = String(d.id)==='48';
      const info = GULF[String(d.id)];
      const name = lang==='ar' ? info?.ar : info?.en;
      const s = T[lang];
      tip.style.opacity = 1;
      tip.style.left = Math.min(x+14, shell.offsetWidth-210)+'px';
      tip.style.top  = Math.max(y-40, 8)+'px';
      tip.style.direction = lang==='ar' ? 'rtl' : 'ltr';
      tip.textContent = (name ? name+' · ' : '') + (isBH ? s.tipBh : s.tipGl);
    }

    Object.entries(GULF).forEach(([id, info]) => {
      const [px, py] = projection([info.lon, info.lat]);
      if (px < 10 || px > W-10 || py < 10 || py > H-10) return;

      const isBH  = id === '48';
      const fw    = isBH ? 30 : 26;
      const fh    = Math.round(fw * 0.667);
      const pinH  = isBH ? 46 : 38;
      const stemC = isBH ? '#2c5fa8' : '#7a7268';

      const g = svg.append('g')
        .attr('transform', `translate(${px},${py})`)
        .style('cursor','pointer')
        .on('click', () => window.open(isBH ? BH_LINK : GL_LINK, '_blank'))
        .on('mousemove', function(event) {
          const rect = shell.getBoundingClientRect();
          const x = event.clientX - rect.left, y = event.clientY - rect.top;
          const s = T[lang];
          tip.style.opacity = 1;
          tip.style.left = Math.min(x+14, shell.offsetWidth-210)+'px';
          tip.style.top  = Math.max(y-40, 8)+'px';
          tip.style.direction = lang==='ar' ? 'rtl' : 'ltr';
          tip.textContent = (lang==='ar' ? info.ar : info.en)+' · '+(isBH ? s.tipBh : s.tipGl);
        })
        .on('mouseleave', () => { tip.style.opacity = 0; });

      g.append('line')
        .attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',-pinH)
        .attr('stroke', stemC).attr('stroke-width', isBH ? 1.8 : 1.4).attr('opacity',.65);

      g.append('circle').attr('cx',0).attr('cy',0).attr('r', isBH ? 3 : 2.5)
        .attr('fill', stemC).attr('opacity',.75);

      g.append('rect')
        .attr('x', -fw/2-1.5).attr('y', -pinH-fh-1.5)
        .attr('width', fw+3).attr('height', fh+3)
        .attr('rx', 4)
        .attr('fill', isBH ? 'rgba(44,95,168,.2)' : 'rgba(0,0,0,.08)');

      const fo = g.append('foreignObject')
        .attr('x', -fw/2).attr('y', -pinH-fh)
        .attr('width', fw).attr('height', fh);

      fo.append('xhtml:span')
        .attr('class', `fi fi-${info.iso} fis`)
        .style('width', fw+'px').style('height', fh+'px')
        .style('display','block').style('border-radius','3px');

      if (isBH) {
        const r1 = g.append('circle').attr('r',3).attr('fill','none').attr('stroke','#2c5fa8').attr('stroke-width',1.2).attr('opacity',0);
        const r2 = g.append('circle').attr('r',3).attr('fill','none').attr('stroke','#2c5fa8').attr('stroke-width',.8).attr('opacity',0);
        function ripple() {
          r1.attr('r',3).attr('opacity',.6).transition().duration(1400).attr('r',18).attr('opacity',0).on('end',ripple);
          r2.attr('r',3).attr('opacity',.35).transition().delay(400).duration(1400).attr('r',12).attr('opacity',0);
        }
        setTimeout(ripple, 800);
      }
    });

    applyLang('en');
  });
</script>
</body>
</html>
